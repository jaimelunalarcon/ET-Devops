apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-backend
  namespace: tienda
  labels:
    app.kubernetes.io/name: tienda-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: tienda-perritos

spec:
  replicas: 2
  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: tienda-backend

  template:
    metadata:
      labels:
        app: tienda-backend
        app.kubernetes.io/name: tienda-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: tienda-perritos

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: tienda-backend
          image: 429001817066.dkr.ecr.us-east-1.amazonaws.com/tienda-backend:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3001
              protocol: TCP

          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: tienda-config
                  key: NODE_ENV

            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: tienda-config
                  key: APP_PORT

            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: tienda-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: tienda-config
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: tienda-config
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: tienda-secret
                  key: MYSQL_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tienda-secret
                  key: MYSQL_PASSWORD

          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12

          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
