apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: tienda
  labels:
    app.kubernetes.io/name: tienda-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: tienda-perritos
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing

spec:
  type: LoadBalancer

  selector:
    app: tienda-frontend

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http